<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Mot de passe oublié</title>

    <style>
        body{
            margin:0;
            background:black;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            text-align:center;
        }

        h1{
            font-size:55px;
            margin-bottom:40px;
        }

        input{
            width:100%;
            padding:20px;
            border:none;
            border-radius:10px;
            margin-bottom:20px;
            font-size:20px;
            box-sizing:border-box;
        }

        button{
            padding:18px 40px;
            border:none;
            border-radius:10px;
            background:#666;
            color:white;
            font-size:22px;
            cursor:pointer;
        }

        button:hover{
            background:#888;
        }

        #message{
            margin-top:20px;
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Mot de passe oublié</h1>

    <input type="email" id="email" placeholder="Votre email">

    <button id="sendBtn">
        Envoyer
    </button>

    <div id="message"></div>

</div>

<script>

const API_URL = "http://localhost/fil-rouge-infra-si/backend/public/index.php";

document.getElementById("sendBtn").addEventListener("click", async () => {

    const email = document.getElementById("email").value;

    const response = await fetch(API_URL + "/api/forgot-password", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email
        })
    });

    const data = await response.json();

    document.getElementById("message").innerText = data.message;
});

</script>

</body>
</html>
