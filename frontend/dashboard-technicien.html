<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Dashboard Technicien</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<script src="js/api.js"></script>
<script src="js/guard.js"></script>

<script>
requireAuth("technicien");
</script>

<body>

    <h1>Dashboard Technicien</h1>

    <!-- stats -->

    <div
        id="statsCards"
        class="stats-grid"
    ></div>

    <!-- actions -->

    <div class="dashboard-grid">

        <button
            class="back-btn"
            onclick="logout()"
        >
            Logout
        </button>

    </div>

    <script>

        async function loadStats() {

            try {

                const result =
                    await apiFetch(
                        "/api/admin/stats"
                    );

                if (!result.success) {

                    return;
                }

                const s =
                    result.stats;

                document.getElementById(
                    "statsCards"
                ).innerHTML = `

                    <a
                        href="tickets-technicien.html?status=en_cours"
                        class="stat-card yellow"
                    >
                        <h3>En cours</h3>

                        <span>
                            ${s.en_cours}
                        </span>
                    </a>

                    <a
                        href="tickets-technicien.html?status=traitee"
                        class="stat-card green"
                    >
                        <h3>Traités</h3>

                        <span>
                            ${s.traitee}
                        </span>
                    </a>

                    <a
                        href="tickets-technicien.html?status=refusee"
                        class="stat-card red"
                    >
                        <h3>Refusés</h3>

                        <span>
                            ${s.refusee}
                        </span>
                    </a>

                `;

            } catch (error) {

                console.error(error);
            }
        }

        async function logout() {

            await fetch(
                "http://localhost/fil-rouge-infra-si/backend/public/index.php/api/logout",
                {
                    method: "POST",

                    credentials: "include"
                }
            );

            window.location.href =
                "login.html";
        }

        loadStats();

    </script>

</body>

</html>
