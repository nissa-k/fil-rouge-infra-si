<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Changer mot de passe</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:100px;
}

h1{
    font-size:70px;
    margin-bottom:40px;
}

form{
    display:flex;
    flex-direction:column;
    width:400px;
    gap:20px;
}

input{
    padding:18px;
    border:none;
    border-radius:10px;
    font-size:20px;
    background:#ddd;
}

button{
    padding:15px;
    border:none;
    border-radius:10px;
    background:#666;
    color:white;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    background:#888;
}

#message{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Changer le mot de passe</h1>

<form id="changePasswordForm">

<input
    type="password"
    id="password"
    placeholder="Nouveau mot de passe"
    required
>

<button type="submit">
    Modifier
</button>

</form>

<div id="message"></div>

</div>

<script>

const form = document.getElementById("changePasswordForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const password = document.getElementById("password").value;

    const response = await fetch(
        "http://localhost/fil-rouge-infra-si/backend/public/index.php/api/change-password",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({
                password
            })
        }
    );

    const data = await response.json();

    const message = document.getElementById("message");

    if(data.success){

        message.style.color = "lightgreen";
        message.innerText = "Mot de passe changé";

        setTimeout(() => {

            window.location.href = "login.html";

        }, 1500);

    } else {

        message.style.color = "red";
        message.innerText = data.message;
    }

});

</script>

</body>
</html>
