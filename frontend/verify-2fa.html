<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Double authentification</title>

    <style>

        body {

            margin: 0;
            padding: 0;

            background: black;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial;
        }

        .container {

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {

            color: white;

            margin-bottom: 40px;

            font-size: 50px;
        }

        input {

            width: 400px;

            padding: 20px;

            border: none;

            border-radius: 15px;

            background: #d9d9d9;

            font-size: 28px;

            margin-bottom: 25px;
        }

        button {

            width: 220px;

            padding: 18px;

            border: none;

            border-radius: 15px;

            background: #666;

            color: white;

            font-size: 30px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #888;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Double authentification
        </h1>

        <form id="verifyForm">

            <input
                type="text"
                id="code"
                placeholder="Code reçu par email"
                required
            >

            <br>

            <button type="submit">
                Vérifier
            </button>

        </form>

    </div>

    <script>

        const form =
            document.getElementById("verifyForm");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const code =
                document.getElementById("code").value;

            const email =
                localStorage.getItem("2fa_email");

            const response = await fetch(
                "http://localhost/fil-rouge-infra-si/backend/public/index.php/api/verify-2fa",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email,
                        code
                    })
                }
            );

            const result = await response.json();

            if (!result.success) {

                alert(result.message);

                return;
            }

            window.location.href =
                "dashboard-client.html";
        });

    </script>

</body>
</html>
