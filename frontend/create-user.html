<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer utilisateur</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/guard.js"></script>
    <script>requireAuth("admin");</script>
</head>
<body>

<h1>Créer un utilisateur</h1>
<a href="dashboard-admin.html" class="back-btn">Retour dashboard</a>

<div style="max-width: 500px; margin: 40px auto 0; text-align: center;">
<form id="createUserForm" style="display: flex; flex-direction: column; gap: 0;">
    <input type="text"  id="full_name" placeholder="Nom complet" required>
    <input type="email" id="email"     placeholder="Email"       required>

    <select id="role">
        <option value="client">Utilisateur</option>
        <option value="technicien">Technicien</option>
        <option value="admin">Admin</option>
    </select>

    <p style="margin: 16px 0; font-size: 14px; color: #aaa; text-align: center;">
        ! Le mot de passe provisoire sera <strong style="color:#fff;">123456</strong>.<br>
        L'utilisateur devra le changer à sa première connexion.
    </p>

    <button type="submit" style="width: 100%;">Créer</button>
</form>
</div>

<p id="msg"></p>

<script>
    const form = document.getElementById("createUserForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            full_name: document.getElementById("full_name").value,
            email:     document.getElementById("email").value,
            role:      document.getElementById("role").value
        };

        const result = await apiFetch("/api/admin/users", {
            method: "POST",
            body:   JSON.stringify(data)
        });
        const msgEl = document.getElementById("msg");

        if (result.success) {
            msgEl.style.color = "green";
            msgEl.innerText = "Utilisateur créé. Mot de passe provisoire : 123456 (changement obligatoire à la première connexion).";
            document.getElementById("createUserForm").reset();
        } else {
            msgEl.style.color = "red";
            msgEl.innerText = " X" + (result.message || "Erreur inconnue");
        }
    });
</script>

</body>
</html>
