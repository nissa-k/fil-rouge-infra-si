<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Dashboard Admin</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<script src="js/api.js"></script>
<script src="js/guard.js"></script>

<script>
requireAuth("admin");
</script>

<body>

    <h1>Dashboard Admin</h1>

    <button class="logout-btn-small" onclick="logout()">Logout</button>

    <!-- stats -->

    <div
        id="statsCards"
        class="stats-grid"
    ></div>

    <script>

        async function loadStats() {

            try {

                const result =
                    await apiFetch(
                        "/api/admin/stats"
                    );

                if (!result.success) {

                    return;
                }

                const s = result.stats;

                document.getElementById("statsCards").innerHTML = `

                    <a
                        href="tickets-admin.html"
                        class="stat-card blue"
                    >
                        <h3>Total tickets</h3>
                        <span>${s.total_tickets}</span>
                    </a>

                    <a
                        href="tickets-admin.html?status=en_cours"
                        class="stat-card yellow"
                    >
                        <h3>En cours</h3>
                        <span>${s.en_cours}</span>
                    </a>

                    <a
                        href="tickets-admin.html?status=traitee"
                        class="stat-card green"
                    >
                        <h3>Traités</h3>
                        <span>${s.traitee}</span>
                    </a>

                    <a
                        href="tickets-admin.html?status=refusee"
                        class="stat-card red"
                    >
                        <h3>Refusés</h3>
                        <span>${s.refusee}</span>
                    </a>

                    <a
                        href="users.html"
                        class="stat-card purple"
                    >
                        <h3>Utilisateurs</h3>
                        <span>${s.users}</span>
                    </a>

                    <a
                        href="assets.html"
                        class="stat-card orange"
                    >
                        <h3>Parc informatique</h3>
                        <span>${s.assets}</span>
                    </a>

                `;

            } catch (error) {

                console.error(error);
            }
        }

        async function logout() {

            try {

                const result = await apiFetch("/api/logout", {
                    method: "POST"
                });

                if (result.success) {

                    window.location.href = "login.html";

                } else {

                    alert(result.message || "Erreur logout");
                }

            } catch (error) {

                console.error(error);

                alert("Erreur réseau");
            }
        }

        loadStats();

    </script>

</body>

</html>
